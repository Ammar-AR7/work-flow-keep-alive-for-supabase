name: Supabase Ultimate Keep-Alive (Insert Method)

on:
  schedule:
    # يعمل كل يومين لضمان بقاء المشروع نشطاً
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  keep-alive-db:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚀 Insert dummy row to wake up Database
        env:
          # استخدام المتغيرات والأسرار التي تم إعدادها
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} 
          
        run: |
          echo "Initiating direct database write operation..."
          
          # إرسال طلب POST ببيانات فارغة {} لأن قاعدة البيانات ستولد الـ id والوقت تلقائياً
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --request POST \
            --url "${SUPABASE_URL}/rest/v1/keep_alive_logs" \
            --header "apikey: ${SUPABASE_SERVICE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            --header "Content-Type: application/json" \
            --header "Prefer: return=minimal" \
            --data "{}")
            
          # التحقق من أن حالة الرد هي 201 (تم الإنشاء) أو 200 (نجاح)
          if [ "$HTTP_STATUS" -eq 201 ] || [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Success: Row inserted successfully! Database is awake. HTTP Status: $HTTP_STATUS"
          else
            echo "⚠️ Error: Failed to insert row. HTTP Status: $HTTP_STATUS"
            exit 1
          fi
