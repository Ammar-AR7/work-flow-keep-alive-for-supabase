name: Supabase Keep-Alive Cron

# 1. متى يعمل السكريبت؟
on:
  schedule:
    # يعمل كل يومين في منتصف الليل (UTC) لضمان نشاط مستمر
    - cron: '0 0 */2 * *'
  # يسمح بتشغيل السكريبت يدوياً للاختبار
  workflow_dispatch: 

# 2. المهام (Jobs)
jobs:
  ping-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🌐 Ping Supabase Database
        # 3. جلب الأسرار بأمان
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # 🚨 هام: استخدم مفتاح Service Role لضمان تنفيذ استعلام فعلي وتجاوز RLS
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} 
          
        # 4. تنفيذ أمر cURL
        run: |
          echo "Initiating strong keep-alive ping to Supabase..."
          
          # استبدل 'YOUR_TABLE_NAME' باسم جدول حقيقي وموجود
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --request GET \
            --url "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1" \
            --header "apikey: ${SUPABASE_SERVICE_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
            
          # 5. التحقق من النتيجة
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Success: Supabase Database is awake and active. HTTP Status: $HTTP_STATUS"
          else
            echo "⚠️ Error: Failed to ping database. HTTP Status: $HTTP_STATUS"
            exit 1
          fi
